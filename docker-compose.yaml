services:
  ministack:
    image: ministackorg/ministack:1.4.1
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4566/_ministack/health', timeout=3).status==200 else 1)\""]
      interval: 5s
      timeout: 5s
      retries: 20
  seed:
    build: ./seed
    env_file: .env
    depends_on:
      ministack:
        condition: service_healthy
  generator:
    build: ./generator
    env_file: .env
    restart: unless-stopped
    depends_on:
      seed:
        condition: service_completed_successfully
  smoke:
    profiles: ["smoke"]
    build: ./generator
    env_file: .env
    volumes:
      - ./smoke:/smoke:ro
    entrypoint: ["python", "/smoke/smoke_test.py"]
    depends_on:
      ministack:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
